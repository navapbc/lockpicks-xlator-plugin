sample_rules:
  - id: sum_gross_income
    rule_type: computed
    source: "Sum the applicant's gross monthly earned and unearned income before applying the general income disregard."
    civil: |
      computed:
        - name: gross_income
          type: money
          group: income_aggregation
          formula: "Income.monthly_earned + Income.monthly_unearned"
          source: "input/policy_docs/medicaid_manual/income_eligibility.md — MS 523 A. INCOME ELIGIBILITY"

  - id: apply_general_disregard
    rule_type: computed
    source: "Apply the $20 monthly general income disregard once to gross income; never reduce countable income below zero."
    civil: |
      computed:
        - name: countable_income
          type: money
          group: exclusion_application
          formula: "max(0, gross_income - 20)"
          source: "input/policy_docs/medicaid_manual/income_eligibility.md — MS 523 A.2. GENERAL INCOME DISREGARD"

  - id: lookup_income_standard
    rule_type: table-lookup
    source: "Select the applicable monthly income standard from the medicaid_income_standards table using eligibility_category and household_size as keys."
    civil: |
      computed:
        - name: income_standard
          type: money
          group: standard_lookup
          table_lookup:
            table: medicaid_income_standards
            key: [eligibility_category, household_size]
            return: standard_amount
          source: "input/policy_docs/medicaid_manual/Addendum 1 PROGRAM STANDARDS.md — Addendum 1"

  - id: decide_eligibility
    rule_type: rule
    source: "Apply citizenship and residency gates, then compare countable_income against income_standard. The case is eligible only when all three conditions hold; otherwise add the matching reason code (NON_CITIZEN, NON_RESIDENT, or INCOME_OVER_STANDARD) and deny."
    civil: |
      rules:
        - id: "MED-DENY-NON-CITIZEN"
          kind: deny
          when: "!Applicant.is_us_citizen"
          then:
            - add_reason:
                code: "NON_CITIZEN"
        - id: "MED-DENY-INCOME-OVER-STANDARD"
          kind: deny
          when: "Applicant.is_us_citizen && Applicant.is_alaska_resident && !is_under_standard"
          then:
            - add_reason:
                code: "INCOME_OVER_STANDARD"
      outputs:
        eligible:
          type: bool
          expr: "count(reasons) == 0"
          source: "input/policy_docs/medicaid_manual/income_eligibility.md — MS 523 A. INCOME ELIGIBILITY"

missing_info:
  - "qualified_non_citizen_categories: the is_us_citizen flag conflates 'citizen' with 'qualified non-citizen' — confirm with the analyst whether qualified non-citizen statuses (LPR ≥5 years, refugee, asylee) should be modeled as a separate enum or remain folded into the bool."

assumptions:
  - "The $20 general income disregard is applied once to combined gross income, not separately to earned and unearned income (per MS 523 A.2)."
  - "Income standards table coverage assumed to span household_size 1–8 across all eligibility categories; canonical does not handle household_size > 8."
  - "Sample income_standard values for examples assume the 2026 program standards table; confirm benefit-year alignment before running /create-tests."
