skeleton:
  inputs:
    - is_us_citizen
    - is_alaska_resident
    - eligibility_category
    - monthly_earned
    - monthly_unearned
    - household_size
    - state_supplement_applies
  outputs:
    - eligible
    - reasons
  computations:
    - stage: income_aggregation
      variables:
        - gross_income
      exprs:
        gross_income: "monthly_earned + monthly_unearned"

    - stage: exclusion_application
      variables:
        - general_income_disregard
        - countable_income
      exprs:
        general_income_disregard: "20"
        countable_income: "max(0, gross_income - general_income_disregard)"

    - stage: standard_lookup
      variables:
        - income_standard
      exprs:
        income_standard: "lookup(medicaid_income_standards, eligibility_category, household_size)"

    - stage: eligibility_decision
      variables:
        - is_under_standard
        - eligible
        - reasons
      exprs:
        is_under_standard: "countable_income < income_standard"
        eligible: "is_us_citizen and is_alaska_resident and is_under_standard"
        reasons: |
          [reason for reason in [
            (if not is_us_citizen then {code: \"NON_CITIZEN\"} else null),
            (if is_us_citizen and not is_alaska_resident then {code: \"NON_RESIDENT\"} else null),
            (if is_us_citizen and is_alaska_resident and not is_under_standard then {code: \"INCOME_OVER_STANDARD\"} else null)
          ] if reason != null]
