eligible:
  description: "Whether the applicant meets Medicaid income eligibility. True when countable income is under the household-size-adjusted standard AND the applicant is a U.S. citizen AND a current Alaska resident."
  examples: ["true", "false"]
  primary: true

reasons:
  description: "Denial reasons accumulated during rule evaluation. Empty list when eligible is true; one or more Reason entries when eligible is false. Each Reason carries a machine-readable code plus a caseworker-facing message and supporting citations."
  examples:
    - "[]"
    - "[{code: NON_CITIZEN, message: ...}]"
    - "[{code: INCOME_OVER_STANDARD, message: ...}]"
  primary: false
