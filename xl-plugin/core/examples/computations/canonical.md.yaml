sections:
  - heading: "## A. INCOME ELIGIBILITY"
    summary: "Defines the income-eligibility test: a Medicaid case is income-eligible when countable monthly income is strictly less than the applicable income standard for the household size and eligibility category."
    tags: [income-eligibility, decision]
    computations:
      - description: "A case is income-eligible when countable monthly income is strictly less than the applicable income standard."
        expr_hint: "is_under_standard = countable_income < income_standard"

  - heading: "### A.1. Gross income"
    summary: "Gross monthly income is the sum of gross earned and gross unearned monthly income — wages/salaries/self-employment net plus Social Security, pensions, and child support."
    tags: [income, gross-income]
    computations:
      - description: "Sum the applicant's gross monthly earned income and gross monthly unearned income to yield gross monthly income."
        expr_hint: "gross_income = monthly_earned + monthly_unearned"

  - heading: "### A.2. General income disregard"
    summary: "A standard $20 general income disregard is subtracted once from gross monthly income (not per income source) before comparing to the income standard. The disregard never reduces countable income below zero."
    tags: [disregard, exclusion]
    computations:
      - description: "Apply the $20 general income disregard once to gross income; clamp the result at zero so countable income never goes negative."
        expr_hint: "countable_income = max(0, gross_income - 20)"

  - heading: "### A.3. Income standard"
    summary: "Select the applicable monthly income standard from the medicaid_income_standards table (Addendum 1) using eligibility_category and household_size as keys. The table covers household_size 1–8."
    tags: [income-standard, table-lookup]
    computations:
      - description: "Look up the applicable monthly income standard by (eligibility_category, household_size) from the program standards table."
        preconditions:
          - "household_size between 1 and 8 inclusive"
        expr_hint: "income_standard = lookup(medicaid_income_standards, [eligibility_category, household_size])"

  - heading: "### A.4. Decision"
    summary: "The case is authorized when countable income is under the standard AND the applicant is a U.S. citizen (or qualified non-citizen) AND a current Alaska resident. Otherwise the case is denied; denial_reason is set from a 3-way priority (non_citizen > non_resident > income_over_standard)."
    tags: [decision, gate-check, denial-reason]
    computations:
      - description: "Produce the final eligibility decision — authorize when all three conditions hold, otherwise deny."
        expr_hint: |
          eligibility_decision = if (is_us_citizen and is_alaska_resident and is_under_standard) then "authorize" else "deny"
      - description: "Set the denial reason from a 3-way priority when eligibility_decision is deny: non-citizen first, non-resident second, otherwise income_over_standard."
        preconditions:
          - "eligibility_decision is deny"
        expr_hint: |
          denial_reason = if (not is_us_citizen) then "non_citizen" else if (not is_alaska_resident) then "non_resident" else "income_over_standard"
