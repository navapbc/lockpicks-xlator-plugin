version: "3.0"
inputs:
  Household:
    monthly_gross_income:
      observations:
        - policy_phrase: "household monthly gross income"
          source_doc: "policy.md"
          section: "Section 1. Definitions"
    size:
      observations:
        - policy_phrase: "household size"
          source_doc: "policy.md"
          section: "Section 1. Definitions"
    has_elderly_member:
      observations:
        - policy_phrase: "contains at least one member who is age 65 or older"
          source_doc: "policy.md"
          section: "Section 3. Categorical eligibility for elderly households"
    countable_resources:
      observations:
        - policy_phrase: "total countable resources"
          source_doc: "policy.md"
          section: "Section 4. Disqualification — assets exceeding limit"

computed:
  federal_poverty_line:
    observations:
      - policy_phrase: "federal poverty line for the household size"
        source_doc: "policy.md"
        section: "Section 1. Definitions"
  income_test_passes:
    observations:
      - policy_phrase: "income-eligible"
        source_doc: "policy.md"
        section: "Section 2. Income eligibility threshold"
  elderly_test_passes:
    observations:
      - policy_phrase: "also eligible if it contains at least one member who is age 65 or older"
        source_doc: "policy.md"
        section: "Section 3. Categorical eligibility for elderly households"
  resource_disqualification:
    observations:
      - policy_phrase: "disqualified ... if its total countable resources exceed"
        source_doc: "policy.md"
        section: "Section 4. Disqualification — assets exceeding limit"

outputs:
  is_eligible:
    observations:
      - policy_phrase: "eligible for this program"
        source_doc: "policy.md"
        section: "Section 5. Final eligibility decision"
